  <circle cx="55" cy="28" r="2" fill="#2D2A26"/>
  <!-- Annotation marks -->
  <line x1="68" y1="50" x2="90" y2="50" stroke="#C97B2A" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="58" x2="85" y2="58" stroke="#C97B2A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="68" y1="66" x2="92" y2="66" stroke="#C97B2A" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
